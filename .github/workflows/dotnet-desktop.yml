# NoBrain AI - CI/CD Pipeline

name: NoBrain AI Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Debug - List files
      shell: bash
      run: |
        echo "=== Root directory ==="
        ls -la
        echo ""
        echo "=== src directory ==="
        ls -la src/ || echo "src/ not found"

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      shell: bash
      run: |
        if [ -f "src/NoBrain.sln" ]; then
          dotnet restore src/NoBrain.sln
        elif [ -f "src/main/NoBrain.csproj" ]; then
          dotnet restore src/main/NoBrain.csproj
        else
          echo "No solution or project file found!"
          exit 1
        fi

    - name: Build
      shell: bash
      run: |
        if [ -f "src/NoBrain.sln" ]; then
          dotnet build src/NoBrain.sln --configuration ${{ matrix.configuration }} --no-restore
        else
          dotnet build src/main/NoBrain.csproj --configuration ${{ matrix.configuration }} --no-restore
        fi

    - name: Run tests (if any)
      shell: bash
      run: |
        if [ -f "src/NoBrain.sln" ]; then
          dotnet test src/NoBrain.sln --configuration ${{ matrix.configuration }} --no-build || true
        fi

    - name: Publish for Windows
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        dotnet publish src/main/NoBrain.csproj \
          --configuration ${{ matrix.configuration }} \
          --runtime win-x64 \
          --self-contained false \
          --output ./publish/NoBrain-win-x64

    - name: Publish for Linux
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        dotnet publish src/main/NoBrain.csproj \
          --configuration ${{ matrix.configuration }} \
          --runtime linux-x64 \
          --self-contained false \
          --output ./publish/NoBrain-linux-x64

    - name: Publish for macOS
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        dotnet publish src/main/NoBrain.csproj \
          --configuration ${{ matrix.configuration }} \
          --runtime osx-x64 \
          --self-contained false \
          --output ./publish/NoBrain-osx-x64

    # Upload artifacts với tên duy nhất
    - name: Upload Windows artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: NoBrain-Win-${{ matrix.configuration }}-${{ github.run_id }}
        path: ./publish/NoBrain-win-x64
        retention-days: 30

    - name: Upload Linux artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: NoBrain-Linux-${{ matrix.configuration }}-${{ github.run_id }}
        path: ./publish/NoBrain-linux-x64
        retention-days: 30

    - name: Upload macOS artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: NoBrain-macOS-${{ matrix.configuration }}-${{ github.run_id }}
        path: ./publish/NoBrain-osx-x64
        retention-days: 30

    - name: Upload source code
      uses: actions/upload-artifact@v4
      with:
        name: NoBrain-Source-${{ matrix.os }}-${{ matrix.configuration }}-${{ github.run_id }}
        path: |
          src/
          LICENSE
          README.md
        retention-days: 90
