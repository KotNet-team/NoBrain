
name: NoBrain AI Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
    # Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Debug: Show structure
    - name: List files
      run: |
        echo "Root directory:"
        ls -la
        echo ""
        echo "src directory:"
        ls -la src/ || echo "src/ not found"
        echo ""
        echo "Looking for .sln files:"
        find . -name "*.sln" -type f

    # Setup .NET SDK
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Restore dependencies - use solution file in src/
    - name: Restore dependencies
      run: dotnet restore src/NoBrain.sln

    # Build the solution
    - name: Build NoBrain
      run: dotnet build src/NoBrain.sln --configuration ${{ matrix.configuration }} --no-restore

    # Run tests if any
    - name: Run tests
      run: |
        dotnet test src/NoBrain.sln --configuration ${{ matrix.configuration }} --no-build --verbosity normal || true

    # Publish for each platform
    - name: Publish for Windows
      if: matrix.os == 'windows-latest'
      run: |
        dotnet publish src/main/NoBrain.csproj \
          --configuration ${{ matrix.configuration }} \
          --runtime win-x64 \
          --self-contained false \
          --output ./publish/NoBrain-win-x64

    - name: Publish for Linux
      if: matrix.os == 'ubuntu-latest'
      run: |
        dotnet publish src/main/NoBrain.csproj \
          --configuration ${{ matrix.configuration }} \
          --runtime linux-x64 \
          --self-contained false \
          --output ./publish/NoBrain-linux-x64

    - name: Publish for macOS
      if: matrix.os == 'macos-latest'
      run: |
        dotnet publish src/main/NoBrain.csproj \
          --configuration ${{ matrix.configuration }} \
          --runtime osx-x64 \
          --self-contained false \
          --output ./publish/NoBrain-osx-x64

    # Upload artifacts
    - name: Upload Windows artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: NoBrain-Win-${{ matrix.configuration }}
        path: ./publish/NoBrain-win-x64
        retention-days: 30

    - name: Upload Linux artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: NoBrain-Linux-${{ matrix.configuration }}
        path: ./publish/NoBrain-linux-x64
        retention-days: 30

    - name: Upload macOS artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: NoBrain-macOS-${{ matrix.configuration }}
        path: ./publish/NoBrain-osx-x64
        retention-days: 30

    # Upload source code (GPL compliance)
    - name: Upload source code
      uses: actions/upload-artifact@v4
      with:
        name: NoBrain-Source-${{ matrix.configuration }}
        path: |
          src/
          LICENSE
          README.md
        retention-days: 90
