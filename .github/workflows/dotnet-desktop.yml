# NoBrain AI - CI/CD Pipeline
# Build and test on every push to main branch
# License: GPL v3.0

name: NoBrain AI Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Debug, Release]
        dotnet-version: [8.0.x]

    runs-on: ${{ matrix.os }}

    steps:
    # Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Setup .NET SDK
    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    # Restore dependencies
    - name: Restore dependencies
      run: dotnet restore NoBrain.sln

    # Build the project
    - name: Build NoBrain
      run: dotnet build NoBrain.sln --configuration ${{ matrix.configuration }} --no-restore

    # Run tests (if any)
    - name: Run tests
      run: dotnet test NoBrain.sln --configuration ${{ matrix.configuration }} --no-build --verbosity normal
      continue-on-error: true  # Continue even if no tests found

    # Publish standalone executable for Windows
    - name: Publish for Windows (x64)
      if: matrix.os == 'windows-latest'
      run: |
        dotnet publish src/main/NoBrain.csproj `
          --configuration ${{ matrix.configuration }} `
          --runtime win-x64 `
          --self-contained false `
          --output ./publish/win-x64
      shell: pwsh

    # Publish standalone executable for Linux
    - name: Publish for Linux (x64)
      if: matrix.os == 'ubuntu-latest'
      run: |
        dotnet publish src/main/NoBrain.csproj \
          --configuration ${{ matrix.configuration }} \
          --runtime linux-x64 \
          --self-contained false \
          --output ./publish/linux-x64

    # Publish standalone executable for macOS
    - name: Publish for macOS (x64)
      if: matrix.os == 'macos-latest'
      run: |
        dotnet publish src/main/NoBrain.csproj \
          --configuration ${{ matrix.configuration }} \
          --runtime osx-x64 \
          --self-contained false \
          --output ./publish/osx-x64

    # Upload build artifacts
    - name: Upload Windows artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: NoBrain-Win-${{ matrix.configuration }}
        path: ./publish/win-x64
        retention-days: 30

    - name: Upload Linux artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: NoBrain-Linux-${{ matrix.configuration }}
        path: ./publish/linux-x64
        retention-days: 30

    - name: Upload macOS artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: NoBrain-macOS-${{ matrix.configuration }}
        path: ./publish/osx-x64
        retention-days: 30

    # Upload source code as artifact (GPL compliance)
    - name: Upload source code (GPL compliance)
      uses: actions/upload-artifact@v4
      with:
        name: NoBrain-Source-${{ matrix.configuration }}
        path: |
          src/
          src/*.sln
          LICENSE
          README.md
        retention-days: 90
